<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Check-In — NAMEFAME</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toast" class="toast"></div>

<!-- NO LOGIN STATE -->
<div class="ci-no-login" id="noLoginScreen" style="display:none;">
  <h2>⚠️ Login Nahi Hai</h2>
  <p>Pehle index page se login karo</p>
  <button class="btn-go-back-ci" onclick="location.href='index.html'">← Wapas Jao</button>
</div>

<!-- MAIN CHECK-IN PAGE -->
<div class="ci-page" id="ciPage">

  <!-- TOP BAR -->
  <div class="ci-topbar">
    <button class="ci-back-btn" onclick="location.href='index.html'">←</button>
    <div class="ci-topbar-info">
      <div class="ci-topbar-title">🟢 Check-In</div>
      <div class="ci-topbar-sub" id="ciTopDate">—</div>
    </div>
    <button class="ci-flip-btn" id="ciFlipBtn" onclick="ciFlipCamera()">🔄</button>
  </div>

  <!-- VIDEO AREA -->
  <div class="ci-video-wrap">
    <video id="ciVideo" autoplay playsinline muted></video>
    <canvas id="ciCanvas"></canvas>
    <img id="ci-preview" alt="selfie preview">

    <!-- Corner guides -->
    <div class="ci-corner tl"></div>
    <div class="ci-corner tr"></div>
    <div class="ci-corner bl"></div>
    <div class="ci-corner br"></div>

    <!-- Employee name overlay (auto from login) -->
    <div class="ci-cam-overlay">
      <div class="emp-badge">
        <span>👤</span>
        <div>
          <div class="emp-name" id="ciEmpName">—</div>
          <div class="emp-role" id="ciEmpRole">—</div>
        </div>
      </div>
    </div>

    <!-- GPS overlay -->
    <div class="ci-gps-badge" id="ciGpsBadge">📍 GPS fetch ho raha hai...</div>
  </div>

  <!-- BOTTOM ACTION BAR -->
  <div class="ci-action-bar">

    <!-- STATE 1: Capture -->
    <div class="ci-state active" id="ci-state-capture">
      <div class="ci-hint">Apna selfie lo — face clearly dikhna chahiye</div>
      <button class="btn-capture" onclick="ciCapturePhoto()">📷 Selfie Lo</button>
    </div>

    <!-- STATE 2: Preview -->
    <div class="ci-state" id="ci-state-preview">
      <div class="ci-hint">Photo acchi lagi? Check-In karo!</div>
      <div class="ci-preview-actions">
        <button class="btn-retake-ci" onclick="ciRetakePhoto()">↩ Retake</button>
        <button class="btn-checkin-submit" id="ciSubmitBtn" onclick="ciSubmitCheckin()">✓ Check-In Karo</button>
      </div>
    </div>

    <!-- STATE 3: Loading -->
    <div class="ci-state" id="ci-state-loading">
      <div class="ci-spinner">
        <div class="spin"></div>
        <div class="spin-txt">Check-in ho raha hai...</div>
      </div>
    </div>

    <!-- STATE 4: Done -->
    <div class="ci-state" id="ci-state-done">
      <div class="ci-done">
        <div class="done-icon">✅</div>
        <div class="done-title">Check-In Ho Gaya!</div>
        <div class="done-sub" id="ciDoneMsg">—</div>
        <button class="btn-go-dash" onclick="location.href='index.html'">← Dashboard pe Jao</button>
      </div>
    </div>

  </div>
</div>

<script src="App.js"></script>
</body>
</html>
