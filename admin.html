<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel — Field Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<!-- MAIN ADMIN CSS -->

<link rel="stylesheet" href="admincss2.css">

<style>
body{
font-family:'Nunito',sans-serif;
background:#f8fafc;
margin:0;
}

.header{
background:#2563eb;
color:#fff;
padding:14px 20px;
font-weight:800;
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:18px;
margin-bottom:18px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card-title{
font-weight:800;
margin-bottom:14px;
font-size:16px;
}

.row{
display:flex;
gap:12px;
flex-wrap:wrap;
}

input,select{
padding:8px 10px;
border-radius:8px;
border:1px solid #e2e6ed;
font-size:13px;
}

button{
background:#2563eb;
color:#fff;
border:none;
padding:9px 16px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#routeMap{
margin-top:12px;
}

.table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

.table th{
text-align:left;
background:#f1f5f9;
padding:8px;
}

.table td{
padding:8px;
border-top:1px solid #e5e7eb;
}
</style>

</head>

<body>

<div class="header">
Field Attendance Admin
</div>

<div class="container">

<!-- ROUTE VIEW -->

<div class="card">

<div class="card-title">Employee Route</div>

<div class="row">

<select id="rt-emp">
<option value="">Employee</option>
</select>

<input type="date" id="rt-date">

<button onclick="loadRoute()">Load Route</button>

</div>

<div id="routeMap"></div>

</div>

<!-- ATTENDANCE TABLE -->

<div class="card">

<div class="card-title">Attendance Records</div>

<table class="table" id="attTable">

<thead>
<tr>
<th>Date</th>
<th>Employee</th>
<th>Area</th>
<th>Check-in</th>
<th>Checkout</th>
<th>Duration</th>
</tr>
</thead>

<tbody id="attBody"></tbody>

</table>

</div>

</div>

<!-- MAIN ADMIN JS -->

<script src="adminjs2.js"></script>

<script>

  const API_URL="https://script.google.com/macros/s/AKfycbz28GI0lPZV7jcPpzPblWdHp03E5WfSylOfxt4hYbyEI3J8vzCOE-udPdH3_A6eeQ3J/exec"
/* SIMPLE API POST */
function apiPost(data){

return fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
})
.then(r=>r.json())

}
  
function apiPost(data){

return new Promise((resolve,reject)=>{

google.script.run
.withSuccessHandler(resolve)
.withFailureHandler(reject)
.api(data)

})

}

/* TIME FORMAT */

function fmtTime(t){
if(!t) return ""
return t
}

/* TOAST */

function toast(msg,type="info"){

let t=document.createElement("div")
t.className="toast "+type
t.innerText=msg

document.body.appendChild(t)

setTimeout(()=>t.classList.add("show"),10)

setTimeout(()=>{
t.classList.remove("show")
setTimeout(()=>t.remove(),300)
},2500)

}

/* LOAD EMPLOYEES */

async function loadEmployees(){

try{

const res=await apiPost({action:"get_employees"})

let sel=document.getElementById("rt-emp")

(res.employees||[]).forEach(e=>{
let op=document.createElement("option")
op.value=e
op.innerText=e
sel.appendChild(op)
})

}
catch(e){
console.error(e)
}

}

window.onload=loadEmployees

</script>

</body>
</html>
