<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin Panel — NAMEFAME</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --border: #2e3250;
    --accent: #6c63ff;
    --accent2: #4ecca3;
    --danger: #ff5c5c;
    --warn: #ffb347;
    --text: #eaeaea;
    --muted: #7a7f9a;
    --green: #4ecca3;
    --red: #ff5c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #23263a; color: #fff; padding: 10px 22px; border-radius: 24px;
    font-size: 14px; font-weight: 700; z-index: 9999; opacity: 0; transition: all .3s; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--green); color: #000; }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .login-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 36px 28px; width: 100%; max-width: 360px;
  }
  .login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  .login-title { text-align: center; font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
  .login-sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .fgroup { margin-bottom: 16px; }
  .fgroup label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .fgroup input {
    width: 100%; background: var(--card2); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 12px 14px; color: var(--text); font-size: 15px; font-family: 'Nunito', sans-serif;
    outline: none; transition: border .2s;
  }
  .fgroup input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 4px;
    transition: opacity .2s;
  }
  .btn-login:hover { opacity: .88; }

  /* ── ADMIN MAIN ── */
  #adminMain { display: none; }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-icon { font-size: 22px; }
  .topbar-title { font-size: 18px; font-weight: 900; color: var(--accent); }
  .topbar-sub { font-size: 11px; color: var(--muted); }
  .btn-logout {
    background: transparent; border: 1.5px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* ── FILTERS ── */
  .filters-wrap {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .filter-group select, .filter-group input[type="date"], .filter-group input[type="text"] {
    background: var(--card2); border: 1.5px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-family: 'Nunito', sans-serif;
    padding: 8px 12px; outline: none; min-width: 140px;
  }
  .filter-group select:focus, .filter-group input:focus { border-color: var(--accent); }
  .btn-filter {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px 18px; font-size: 13px; font-weight: 800; cursor: pointer;
    align-self: flex-end; transition: opacity .2s;
  }
  .btn-filter:hover { opacity: .85; }
  .btn-export {
    background: transparent; border: 1.5px solid var(--accent2); color: var(--accent2);
    border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 800;
    cursor: pointer; align-self: flex-end; transition: all .2s;
  }
  .btn-export:hover { background: var(--accent2); color: #000; }
  .btn-today {
    background: transparent; border: 1.5px solid var(--warn); color: var(--warn);
    border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 800;
    cursor: pointer; align-self: flex-end; transition: all .2s;
  }
  .btn-today:hover { background: var(--warn); color: #000; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding: 16px 20px;
  }
  @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px;
  }
  .stat-val { font-size: 26px; font-weight: 900; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 2px; }

  /* ── EMP TABS ── */
  .emp-tabs-wrap { padding: 0 20px 12px; overflow-x: auto; }
  .emp-tabs { display: flex; gap: 8px; padding-bottom: 4px; }
  .emp-tab {
    background: var(--card2); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
    white-space: nowrap; color: var(--muted); transition: all .2s; flex-shrink: 0;
  }
  .emp-tab.active, .emp-tab:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── CONTENT ── */
  .content { padding: 0 20px 40px; }

  /* ── EMPLOYEE CARD ── */
  .emp-section {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    margin-bottom: 20px; overflow: hidden;
  }
  .emp-header {
    background: var(--card2); padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .emp-header-left { display: flex; align-items: center; gap: 12px; }
  .emp-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; color: #fff;
  }
  .emp-name-big { font-size: 16px; font-weight: 900; }
  .emp-desig { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .emp-status-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
  }
  .emp-status-badge.in { background: rgba(78,204,163,.15); color: var(--green); border: 1px solid rgba(78,204,163,.3); }
  .emp-status-badge.out { background: rgba(255,92,92,.1); color: var(--red); border: 1px solid rgba(255,92,92,.2); }

  /* ── DATA SECTIONS ── */
  .data-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  }
  @media (max-width: 500px) { .data-grid { grid-template-columns: 1fr; } }
  .data-item {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .data-item:nth-child(even) { border-right: none; }
  .data-lbl { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .data-val { font-size: 14px; font-weight: 800; color: var(--text); }
  .data-val.green { color: var(--green); }
  .data-val.warn { color: var(--warn); }
  .data-val a { color: var(--accent2); text-decoration: none; font-size: 13px; }
  .data-val a:hover { text-decoration: underline; }

  /* ── SECTION TITLES ── */
  .sec-title {
    padding: 12px 20px 8px; font-size: 11px; font-weight: 800;
    color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
    border-bottom: 1px solid var(--border); background: rgba(108,99,255,.05);
  }

  /* ── VISITS TABLE ── */
  .visits-wrap { overflow-x: auto; }
  .visits-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .visits-table th {
    text-align: left; padding: 10px 14px; font-size: 10px;
    color: var(--muted); font-weight: 800; text-transform: uppercase;
    letter-spacing: .5px; border-bottom: 1px solid var(--border);
    background: var(--card2);
  }
  .visits-table td {
    padding: 10px 14px; border-bottom: 1px solid rgba(46,50,80,.5);
    vertical-align: middle;
  }
  .visits-table tr:last-child td { border-bottom: none; }
  .visits-table tr:hover td { background: rgba(108,99,255,.04); }
  .visit-shop { font-weight: 800; }
  .visit-area { color: var(--muted); font-size: 12px; }

  /* ── PHOTO THUMBS ── */
  .photos-row { display: flex; gap: 10px; padding: 14px 20px; flex-wrap: wrap; }
  .photo-thumb-wrap { position: relative; }
  .photo-thumb {
    width: 80px; height: 80px; border-radius: 10px; object-fit: cover;
    border: 2px solid var(--border); cursor: pointer; transition: transform .2s;
  }
  .photo-thumb:hover { transform: scale(1.05); border-color: var(--accent); }
  .photo-thumb-lbl {
    font-size: 10px; color: var(--muted); text-align: center;
    margin-top: 4px; font-weight: 700;
  }
  .no-photos { padding: 14px 20px; color: var(--muted); font-size: 13px; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 9000; align-items: center; justify-content: center; flex-direction: column;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 80vh; border-radius: 12px; object-fit: contain; }
  .lightbox-close {
    position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,.1);
    border: none; color: #fff; font-size: 22px; width: 40px; height: 40px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .lightbox-lbl { color: var(--muted); font-size: 13px; margin-top: 12px; font-weight: 700; }

  /* ── LOADING / EMPTY ── */
  .loading-wrap { padding: 40px; text-align: center; color: var(--muted); }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* ── NO DATA ── */
  .no-data { color: var(--muted); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="photo">
  <div class="lightbox-lbl" id="lightboxLbl"></div>
</div>

<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">NAMEFAME Field Attendance</div>
    <div class="fgroup">
      <label>Admin Password</label>
      <input type="password" id="adminPassInput" placeholder="Password daalo"
        onkeydown="if(event.key==='Enter')doAdminLogin()">
    </div>
    <button class="btn-login" onclick="doAdminLogin()">🔓 Login</button>
  </div>
</div>

<!-- ══ ADMIN MAIN ══ -->
<div id="adminMain">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">⚙️</div>
      <div>
        <div class="topbar-title">NAMEFAME Admin</div>
        <div class="topbar-sub" id="adminDateLbl">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="adminLogout()">Logout</button>
  </div>

  <!-- FILTERS -->
  <div class="filters-wrap">
    <div class="filter-group">
      <label>Employee</label>
      <select id="fEmp">
        <option value="all">— Sab Employees —</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Date Se</label>
      <input type="date" id="fDateFrom">
    </div>
    <div class="filter-group">
      <label>Date Tak</label>
      <input type="date" id="fDateTo">
    </div>
    <button class="btn-today" onclick="setToday()">📅 Aaj</button>
    <button class="btn-filter" onclick="loadData()">🔍 Search</button>
    <button class="btn-export" onclick="exportCSV()">⬇️ CSV Export</button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">—</div>
      <div class="stat-lbl">Total Records</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statCheckedIn">—</div>
      <div class="stat-lbl">Checked In Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statVisits">—</div>
      <div class="stat-lbl">Total Visits</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statDist">—</div>
      <div class="stat-lbl">Avg Distance</div>
    </div>
  </div>

  <!-- EMP QUICK TABS -->
  <div class="emp-tabs-wrap">
    <div class="emp-tabs" id="empTabs"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content" id="mainContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>Data load ho raha hai...</div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6WBAIGox6yRF4VNbN80zFDkjqL4DQy8F0YlJzVoW41jHAwWJyosm9s-u_sbBsEN4/exec";
var ADMIN_PASS = "admin123"; // ← Yahan apna password badlo

var allData      = [];
var allEmployees = [];
var filteredData = [];

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function doAdminLogin() {
  var pass = document.getElementById("adminPassInput").value;
  if (pass === ADMIN_PASS) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("adminMain").style.display   = "block";
    sessionStorage.setItem("adminAuth", "1");
    initAdmin();
  } else {
    toast("Galat password!", "error");
    document.getElementById("adminPassInput").value = "";
  }
}

function adminLogout() {
  sessionStorage.removeItem("adminAuth");
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("adminMain").style.display   = "none";
  document.getElementById("adminPassInput").value = "";
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
function initAdmin() {
  var d = new Date();
  document.getElementById("adminDateLbl").textContent = fmtDateLong(d);
  setToday();
  loadEmployees();
  loadData();
}

function setToday() {
  var today = new Date().toISOString().split("T")[0];
  document.getElementById("fDateFrom").value = today;
  document.getElementById("fDateTo").value   = today;
}

function fmtDateLong(d) {
  var days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[d.getDay()] + ", " + d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
}

// ══════════════════════════════════════
// LOAD EMPLOYEES
// ══════════════════════════════════════
function loadEmployees() {
  apiPost({ action: "get_employees" }).then(function(r) {
    if (r.employees && r.employees.length) {
      allEmployees = r.employees;
      populateEmpFilter(r.employees);
      buildEmpTabs(r.employees);
    }
  }).catch(function() {});
}

function populateEmpFilter(list) {
  var sel = document.getElementById("fEmp");
  sel.innerHTML = '<option value="all">— Sab Employees —</option>';
  list.forEach(function(e) {
    var o = document.createElement("option");
    o.value = e.name; o.textContent = e.name;
    sel.appendChild(o);
  });
}

function buildEmpTabs(list) {
  var wrap = document.getElementById("empTabs");
  wrap.innerHTML = '<div class="emp-tab active" onclick="filterByEmp(\'all\',this)">👥 Sab</div>';
  list.forEach(function(e) {
    var d = document.createElement("div");
    d.className = "emp-tab";
    d.textContent = e.name;
    d.onclick = function() { filterByEmp(e.name, d); };
    wrap.appendChild(d);
  });
}

function filterByEmp(name, el) {
  document.querySelectorAll(".emp-tab").forEach(function(t) { t.classList.remove("active"); });
  el.classList.add("active");
  document.getElementById("fEmp").value = name;
  loadData();
}

// ══════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════
function loadData() {
  var emp      = document.getElementById("fEmp").value;
  var dateFrom = document.getElementById("fDateFrom").value;
  var dateTo   = document.getElementById("fDateTo").value;

  document.getElementById("mainContent").innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><div>Data aa raha hai...</div></div>';

  apiPost({
    action: "get_admin_data",
    emp: emp === "all" ? "" : emp,
    dateFrom: dateFrom,
    dateTo: dateTo
  }).then(function(r) {
    allData      = r.data || [];
    filteredData = allData;
    updateStats();
    renderCards();
  }).catch(function(err) {
    // Fallback: try get_attendance
    apiPost({
      action: "get_attendance",
      emp: emp === "all" ? "" : emp,
      dateFrom: dateFrom,
      dateTo: dateTo
    }).then(function(r) {
      allData      = r.data || r.rows || [];
      filteredData = allData;
      updateStats();
      renderCards();
    }).catch(function() {
      document.getElementById("mainContent").innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>Data load nahi hua. Sheet se check karo.</div>';
    });
  });
}

// ══════════════════════════════════════
// STATS
// ══════════════════════════════════════
function updateStats() {
  var today    = new Date().toISOString().split("T")[0];
  var checkedIn = filteredData.filter(function(r) {
    return r.checkinTime && (!r.checkoutTime || r.checkoutTime === "");
  }).length;
  var visits = filteredData.reduce(function(acc, r) {
    return acc + (r.visits ? r.visits.length : 0);
  }, 0);
  var dists = filteredData.map(function(r) { return parseFloat(r.distance || 0); }).filter(Boolean);
  var avgDist = dists.length ? (dists.reduce(function(a,b){return a+b;},0)/dists.length).toFixed(1) : "0";

  document.getElementById("statTotal").textContent     = filteredData.length;
  document.getElementById("statCheckedIn").textContent = checkedIn;
  document.getElementById("statVisits").textContent    = visits;
  document.getElementById("statDist").textContent      = avgDist + " km";
}

// ══════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════
function renderCards() {
  var cont = document.getElementById("mainContent");
  if (!filteredData || !filteredData.length) {
    cont.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>Is range mein koi data nahi mila.</div>';
    return;
  }

  var html = "";
  filteredData.forEach(function(row, idx) {
    var initials = (row.name || "?").split(" ").map(function(w){return w[0];}).join("").toUpperCase().slice(0,2);
    var isIn = row.checkinTime && (!row.checkoutTime || row.checkoutTime === "");
    var statusBadge = isIn
      ? '<span class="emp-status-badge in">🟢 Checked In</span>'
      : (row.checkoutTime ? '<span class="emp-status-badge out">🔴 Checked Out</span>'
                          : '<span class="emp-status-badge out">⚪ No Data</span>');

    // ── ATTENDANCE DATA ──
    var attnHtml = '<div class="data-grid">'
      + dataItem("📅 Date",           row.date        || "—")
      + dataItem("🕐 Check-In",       row.checkinTime || "—", row.checkinTime ? "green" : "")
      + dataItem("🕔 Check-Out",      row.checkoutTime || "—", row.checkoutTime ? "" : "warn")
      + dataItem("⏱ Duration",        row.duration    || "—")
      + dataItem("🔧 Odo Start",      row.odometerStart ? row.odometerStart + " km" : "—")
      + dataItem("🔧 Odo End",        row.odometerEnd   ? row.odometerEnd   + " km" : "—")
      + dataItem("📏 Distance",       row.distance      ? row.distance + " km"      : "—")
      + dataItem("📍 GPS", row.mapLink
          ? '<a href="' + row.mapLink + '" target="_blank">📍 Map Dekho</a>'
          : "—")
      + '</div>';

    // ── VISITS TABLE ──
    var visitsHtml = "";
    if (row.visits && row.visits.length) {
      var rows = row.visits.map(function(v) {
        return '<tr>'
          + '<td><div class="visit-shop">' + (v.shopName || "—") + '</div>'
          + '<div class="visit-area">' + (v.area || "") + '</div></td>'
          + '<td>' + (v.shopkeeperName || "—") + '</td>'
          + '<td>' + (v.shopkeeperContact || "—") + '</td>'
          + '<td>' + (v.time || "—") + '</td>'
          + '<td>' + (v.notes || "—") + '</td>'
          + '<td>' + (v.mapLink ? '<a href="' + v.mapLink + '" target="_blank">📍</a>' : "—") + '</td>'
          + '</tr>';
      }).join("");
      visitsHtml = '<div class="sec-title">📍 Visit Records (' + row.visits.length + ')</div>'
        + '<div class="visits-wrap"><table class="visits-table">'
        + '<thead><tr><th>Shop</th><th>Malik</th><th>Contact</th><th>Time</th><th>Notes</th><th>GPS</th></tr></thead>'
        + '<tbody>' + rows + '</tbody></table></div>';
    }

    // ── PHOTOS ──
    var photosArr = [];
    if (row.photo1) photosArr.push({ src: row.photo1, lbl: "Selfie 1" });
    if (row.photo2) photosArr.push({ src: row.photo2, lbl: "Odometer (In)" });
    if (row.checkoutPhoto) photosArr.push({ src: row.checkoutPhoto, lbl: "Odometer (Out)" });
    if (row.photo)  photosArr.push({ src: row.photo,  lbl: "Photo" });

    var photosHtml = "";
    if (photosArr.length) {
      photosHtml = '<div class="sec-title">📸 Photos</div><div class="photos-row">'
        + photosArr.map(function(p, pi) {
          return '<div class="photo-thumb-wrap">'
            + '<img class="photo-thumb" src="' + p.src + '" alt="' + p.lbl + '" '
            + 'onclick="openLightbox(\'' + p.src.replace(/'/g,"") + '\',\'' + p.lbl + '\')">'
            + '<div class="photo-thumb-lbl">' + p.lbl + '</div></div>';
        }).join("")
        + '</div>';
    } else {
      photosHtml = '<div class="no-photos">📷 Koi photo nahi</div>';
    }

    html += '<div class="emp-section">'
      + '<div class="emp-header">'
      + '<div class="emp-header-left">'
      + '<div class="emp-avatar">' + initials + '</div>'
      + '<div><div class="emp-name-big">' + (row.name || "Unknown") + '</div>'
      + '<div class="emp-desig">' + (row.designation || row.role || "Field Employee") + '</div></div>'
      + '</div>' + statusBadge + '</div>'
      + '<div class="sec-title">📋 Attendance Details</div>'
      + attnHtml
      + visitsHtml
      + photosHtml
      + '</div>';
  });

  cont.innerHTML = html;
}

function dataItem(lbl, val, cls) {
  return '<div class="data-item">'
    + '<div class="data-lbl">' + lbl + '</div>'
    + '<div class="data-val' + (cls ? " " + cls : "") + '">' + val + '</div>'
    + '</div>';
}

// ══════════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════════
function openLightbox(src, lbl) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightboxLbl").textContent = lbl;
  document.getElementById("lightbox").classList.add("show");
}
function closeLightbox() {
  document.getElementById("lightbox").classList.remove("show");
}

// ══════════════════════════════════════
// CSV EXPORT
// ══════════════════════════════════════
function exportCSV() {
  if (!filteredData || !filteredData.length) { toast("Koi data nahi export ke liye", "error"); return; }
  var headers = ["Name","Designation","Date","Check-In","Check-Out","Duration","Odo Start","Odo End","Distance","GPS Link","Total Visits"];
  var rows = filteredData.map(function(r) {
    return [
      r.name || "",
      r.designation || "",
      r.date || "",
      r.checkinTime || "",
      r.checkoutTime || "",
      r.duration || "",
      r.odometerStart || "",
      r.odometerEnd || "",
      r.distance || "",
      r.mapLink || "",
      (r.visits ? r.visits.length : 0)
    ].map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(",");
  });
  var csv = [headers.join(",")].concat(rows).join("\n");
  var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href = url; a.download = "NAMEFAME_Export_" + new Date().toISOString().split("T")[0] + ".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast("CSV download ho raha hai ✓", "success");
}

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
function apiPost(data) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
var toastTimer = null;
function toast(msg, type) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show" + (type ? " " + type : "");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove("show"); }, 3000);
}
