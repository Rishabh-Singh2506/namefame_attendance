<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NAMEFAME Field Attendance</title>
<link rel="stylesheet" href="styles.css"><style>
/* === PURA ORIGINAL STYLE YAHAN HAI (copy kiya) + thoda extra for visit photo preview === */
:root{--bg:#ffffff;--card:#f8f9fb;--card2:#f0f2f6;--border:#e2e6ed;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--text:#1a1f2e;--muted:#6b7280;--radius:14px;font-family:'Nunito',sans-serif;}
/* ... pura original style paste kar diya hai (space bachane ke liye yahan short kiya, actual code mein full style hai) ... */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1f2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.cam-corner,.gps-badge,.modal-box etc. same as original.
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LANDING, VERIFY, DASHBOARD same as your original -->

<!-- VISIT MODAL — AB FULL FIELDS + PHOTO (sab mandatory/non-mandatory jaise tune kaha) -->
<div class="modal-overlay" id="visitModal">
  <div class="modal-box">
    <div class="modal-title">📍 New Visit Record</div>
    
    <div class="fgroup"><label class="lbl">Shop Name <span style="color:red">*</span></label>
      <input type="text" id="mShopName" placeholder="Shop ka naam">
    </div>
    <div class="fgroup"><label class="lbl">Shopkeeper Name (optional)</label>
      <input type="text" id="mShopkeeperName" placeholder="Shopkeeper naam">
    </div>
    <div class="fgroup"><label class="lbl">Shopkeeper Contact (optional)</label>
      <input type="text" id="mShopkeeperContact" placeholder="Contact no.">
    </div>
    <div class="fgroup"><label class="lbl">Area of Visit <span style="color:red">*</span></label>
      <input type="text" id="mArea" placeholder="Area naam">
    </div>
    <div class="fgroup"><label class="lbl">Notes (optional)</label>
      <textarea id="mNotes" rows="3" placeholder="Koi extra note..."></textarea>
    </div>

    <!-- PHOTO SECTION -->
    <div class="fgroup">
      <label class="lbl">Visit Photo <span style="color:red">*</span></label>
      <button onclick="takeVisitPhoto()" class="btn-primary" style="width:100%;padding:12px;">📸 Photo Capture Karo</button>
      <div id="visitPhotoPreview" style="display:none;margin-top:10px;text-align:center;">
        <img id="visitThumb" style="width:100%;max-height:180px;border-radius:10px;border:2px solid #16a34a;">
        <p style="font-size:11px;color:#16a34a;margin-top:5px;">Photo ready ✓</p>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="cancelVisit()">Cancel</button>
      <button class="btn-save" id="visitSaveBtn" onclick="saveVisit()">✓ Save & Send to Sheet</button>
    </div>
  </div>
</div>

<!-- CAMERA SCREEN (sirf New Visit aur Quick Photo ke liye ab use hoga) — same as original -->
<div class="screen" id="s-cam"> ... pura camera code same as your original ... </div>

<script>
// === ORIGINAL SCRIPT + CHANGES ===

var visitPhoto = "";   // global for visit photo

// doCheckin ab alag page kholega
function doCheckin() {
  if (!currentEmp) {
    toast("Pehle login karo", "error");
    return;
  }
  if (store.get("ci_" + currentEmp.name)) {
    toast("Aap pehle se checked-in hain", "info");
    return;
  }
  // Direct camera page kholo
  window.location.href = "checkin.html";
}

// New Visit modal ab full fields + photo
function doNewVisit(){
  if(!currentEmp) return;
  // clear previous
  document.getElementById("mShopName").value="";
  document.getElementById("mShopkeeperName").value="";
  document.getElementById("mShopkeeperContact").value="";
  document.getElementById("mArea").value="";
  document.getElementById("mNotes").value="";
  visitPhoto = "";
  document.getElementById("visitPhotoPreview").style.display="none";
  document.getElementById("visitModal").classList.add("show");
  getGps();
}

function takeVisitPhoto(){
  document.getElementById("visitModal").classList.remove("show");
  openCamera("visit", "environment", "📷 Visit Photo Lo");
}

// acceptPhoto mein visit mode handle
function acceptPhoto(){
  var data = document.getElementById("photoPreview").src;
  stopCam();
  if(camMode==="visit"){
    visitPhoto = data;
    showScreen("s-dash");
    document.getElementById("visitModal").classList.add("show");
    document.getElementById("visitThumb").src = data;
    document.getElementById("visitPhotoPreview").style.display="block";
  } else if(camMode==="quick"){
    sendQuickPhoto(data);
  }
}

// saveVisit — ab pura data sheet mein (column names exact match)
function saveVisit(){
  var shopName = document.getElementById("mShopName").value.trim();
  var area = document.getElementById("mArea").value.trim();
  if(!shopName) return toast("Shop Name zaroori hai *","error");
  if(!area) return toast("Area of Visit zaroori hai *","error");
  if(!visitPhoto) return toast("Photo lena zaroori hai *","error");

  var btn = document.getElementById("visitSaveBtn");
  btn.classList.add("loading"); btn.textContent="Sending to Sheet...";

  var mapLink = gpsPos ? "https://maps.google.com/?q="+gpsPos.lat+","+gpsPos.lng : "";

  apiPost({
    action: "checkin",
    name: currentEmp.name,
    contact: currentEmp.contact || "",
    shopName: shopName,
    shopkeeperName: document.getElementById("mShopkeeperName").value.trim(),
    shopkeeperContact: document.getElementById("mShopkeeperContact").value.trim(),
    area: area,
    notes: document.getElementById("mNotes").value.trim(),
    mapLink: mapLink,
    photo: visitPhoto
  }).then(function(r){
    btn.classList.remove("loading"); btn.textContent="✓ Save & Send";
    document.getElementById("visitModal").classList.remove("show");
    visitPhoto = "";
    document.getElementById("visitPhotoPreview").style.display="none";
    toast("Visit sheet mein save ho gaya ✓","success");
  }).catch(function(){ btn.classList.remove("loading"); toast("Error","error"); });
}

// baaki pura script same (doLogout, refreshDash, quick photo etc.)
</script>
</body>
</html>
